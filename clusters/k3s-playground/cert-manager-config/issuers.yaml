# Bootstrap issuer — only used to sign the local CA cert below
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
# Local CA certificate stored in cert-manager namespace
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lan-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: lan-ca
  secretName: lan-ca-tls
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
# Issues all *.lan app certificates
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: lan-ca
spec:
  ca:
    secretName: lan-ca-tls
