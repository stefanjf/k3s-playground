apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: headlamp-tls
  namespace: headlamp
spec:
  secretName: headlamp-tls
  issuerRef:
    name: lan-ca
    kind: ClusterIssuer
  dnsNames:
    - headlamp.lan
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: adguard-tls
  namespace: adguard
spec:
  secretName: adguard-tls
  issuerRef:
    name: lan-ca
    kind: ClusterIssuer
  dnsNames:
    - adguard.lan
